name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: "1.24"
          cache: true

      - name: Verify version consistency
        run: |
          TAG="${GITHUB_REF_NAME}"
          CODE_VERSION="v$(grep 'const Version' doc.go | sed 's/.*\"\(.*\)\"/\1/')"
          echo "Git tag:      $TAG"
          echo "Code version: $CODE_VERSION"
          if [ "$TAG" != "$CODE_VERSION" ]; then
            echo "::error::Version mismatch: git tag is $TAG but doc.go has $CODE_VERSION"
            exit 1
          fi

      - name: Run preflight
        run: PREFLIGHT_RUN_RACE=1 bash ./scripts/preflight.sh

      - name: Create GitHub Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Trigger Go proxy indexing
        run: GOPROXY=proxy.golang.org go list -m "github.com/fastygo/base@${GITHUB_REF_NAME}"
